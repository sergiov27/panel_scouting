<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCOUT PRO 360° - Scatter</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

header{
    background:#1e293b;
    height:60px;
    display:flex;
    align-items:center;
    padding-left:20px;
    font-weight:bold;
    font-size:18px;
    color:#ffd50d;
}

/* layout principal */

.layout{
    display:flex;
}

/* panel filtros */

.panel-filtros{
    width:260px;
    background:#111827;
    border-right:1px solid #334155;
    padding:20px;
}

/* scatter container */

.panel-grafico{
    flex:1;
    padding:20px;
}

/* cajas filtro */

.filtro-box{
    background:#1e293b;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #334155;
}

select{
    width:100%;
    padding:6px;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
}

/* slider */

.noUi-connect{
    background:#ffd50d;
}

.noUi-handle{
    background:#1e293b;
    border:2px solid #ffd50d;
}

/* controles scatter */

.controles-scatter{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.control-eje{
    width:250px;
}

canvas{
    background:#111827;
    border:1px solid #334155;
    height:600px;
}

</style>
</head>

<body>

<header>
SCOUT PRO 360° — Scatter Plot
</header>

<div class="layout">

<!-- PANEL IZQUIERDO -->

<div class="panel-filtros">

<div class="filtro-box">

<label>Liga</label>

<select id="selectorLiga">
<option value="escocia">Scottish Premiership</option>
<option value="chile">Primera División Chile</option>
<option value="peru">Liga 1 Perú</option>
</select>

</div>

<div class="filtro-box">

<label>Posición</label>

<select id="selectorPosicion">
<option value="todos">Todos</option>
<option value="delantero">Delantero</option>
<option value="mediocentro">Mediocentro</option>
<option value="defensa">Defensa Central</option>
<option value="extremo">Extremo</option>
<option value="lateral">Lateral</option>
<option value="Mediocentro Defensivo">Mediocentro Defensivo</option>
</select>

</div>

<div class="filtro-box">

<label>Minutos</label>

<div id="sliderMinutos"></div>

</div>

<div class="filtro-box">

<label>Edad</label>

<div id="sliderEdad"></div>

</div>

</div>

<!-- PANEL DERECHO -->

<div class="panel-grafico">

<div class="controles-scatter">

<div class="control-eje">

<label>Eje X</label>
<select id="ejeX"></select>

</div>

<div class="control-eje">

<label>Eje Y</label>
<select id="ejeY"></select>

</div>

</div>

<canvas id="scatterChart"></canvas>

</div>

</div>

<script>

console.log("SCRIPT CARGADO")

    const basesDatos = {

escocia:{database:"spfl_database.json"},
chile:{database:"chile_database.json"},
peru:{database:"peru_database.json"}

}

const metricasScatter = [

{ key:"duelos_aereos_ganados_90", label:"Duelos Aéreos" },
{ key:"goles_excepto_los_penaltis_90", label:"Goles s/p" },
{ key:"acciones_de_ataque_exitosas_90", label:"Acciones Ofensivas" },
{ key:"x_g_90", label:"xG" },
{ key:"asistencias_90", label:"Asistencias" },
{ key:"duelos_atacantes_ganados_90", label:"Duelos Ofensivos" },
{ key:"asist_remate_90", label:"Asist. de Remate" },
{ key:"carreras_en_progresion_90", label:"Conducciones Progresivas" },
{ key:"regates_exitosos_90", label:"Regates Exitosos" },
{ key:"remates_90", label:"Remates" }

]

let dataOriginal=[]
let dataFiltrada=[]
let scatterChart


function cargarLiga(liga){

console.log("Intentando cargar:", basesDatos[liga].database)

fetch(basesDatos[liga].database)

.then(response => {

if(!response.ok){
throw new Error("HTTP error " + response.status)
}

return response.json()

})

.then(data=>{

console.log("DATA CARGADA:", data)

dataOriginal=data
dataFiltrada=[...data]

cargarMetricas()
configurarSliderMinutos()
configurarSliderEdad()

if(!scatterChart){
crearScatter()
}

filtrarDatos()

})

.catch(error=>{
console.error("ERROR CARGANDO JSON:", error)
})

}

function cargarMetricas(){

const ejeX=document.getElementById("ejeX")
const ejeY=document.getElementById("ejeY")

ejeX.innerHTML=""
ejeY.innerHTML=""

metricasScatter.forEach(m=>{

const optionX=document.createElement("option")
optionX.value=m.key
optionX.textContent=m.label

const optionY=document.createElement("option")
optionY.value=m.key
optionY.textContent=m.label

ejeX.appendChild(optionX)
ejeY.appendChild(optionY)

})

}
function crearScatter(){

const ctx=document.getElementById("scatterChart")

scatterChart=new Chart(ctx,{
type:"scatter",

data:{
datasets:[{
label:"Jugadores",
data:[],
backgroundColor:"#ffd50d"
}]
},

options:{
plugins:{
legend:{display:false}
},

scales:{
x:{
ticks:{color:"white"},
grid:{color:"#334155"}
},

y:{
ticks:{color:"white"},
grid:{color:"#334155"}
}
}
}

})

}

function actualizarScatter(){

const ejeX=document.getElementById("ejeX").value
const ejeY=document.getElementById("ejeY").value

if(!ejeX || !ejeY) return

const puntos=dataFiltrada.map(j=>({

x:parseFloat(j[ejeX])||0,
y:parseFloat(j[ejeY])||0,
jugador:j.jugador

}))

scatterChart.data.datasets[0].data=puntos

scatterChart.update()

}

function configurarSliderMinutos(){

const minutos=dataOriginal.map(j=>parseInt(j.minutos_jugados)||0)

const min=Math.min(...minutos)
const max=Math.max(...minutos)

const slider=document.getElementById("sliderMinutos")

if(slider.noUiSlider){
slider.noUiSlider.destroy()
}

noUiSlider.create(slider,{
start:[min,max],
connect:true,
step:1,
range:{
min:min,
max:max
}
})

slider.noUiSlider.on("update",function(values){

const minVal=Math.round(values[0])
const maxVal=Math.round(values[1])

filtrarDatos()

})

}

function configurarSliderEdad(){

const edades=dataOriginal.map(j=>parseInt(j.edad)||0)

const min=Math.min(...edades)
const max=Math.max(...edades)

const slider=document.getElementById("sliderEdad")

if(slider.noUiSlider){
slider.noUiSlider.destroy()
}

noUiSlider.create(slider,{
start:[min,max],
connect:true,
step:1,
range:{
min:min,
max:max
}
})

slider.noUiSlider.on("update",function(){

filtrarDatos()

})

}

function filtrarDatos(){

const posicion=document.getElementById("selectorPosicion").value

const minutosValues=document
.getElementById("sliderMinutos")
.noUiSlider.get()

const edadValues=document
.getElementById("sliderEdad")
.noUiSlider.get()

const minMin=Math.round(minutosValues[0])
const maxMin=Math.round(minutosValues[1])

const minEdad=Math.round(edadValues[0])
const maxEdad=Math.round(edadValues[1])

dataFiltrada=dataOriginal.filter(j=>{

const minutos=parseInt(j.minutos_jugados)||0
const edad=parseInt(j.edad)||0

let posicionMatch=true

if(posicion!=="todos"){
posicionMatch=j.posicion_1?.toLowerCase().includes(posicion)
}

return minutos>=minMin &&
minutos<=maxMin &&
edad>=minEdad &&
edad<=maxEdad &&
posicionMatch

})

actualizarScatter()

}

document.getElementById("ejeX")
.addEventListener("change",actualizarScatter)

document.getElementById("ejeY")
.addEventListener("change",actualizarScatter)

document.getElementById("selectorLiga")
.addEventListener("change",function(){
cargarLiga(this.value)
})

document.getElementById("selectorPosicion")
.addEventListener("change",filtrarDatos)

cargarLiga("escocia")
